<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Home Lab — AI Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    SOC Home Lab
  </div>
  <div class="status-bar">
    <span id="last-refreshed"></span>
  </div>
</header>

<div class="main">

  <!-- Left panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title"># investigation-report</span>
    </div>
    <div class="panel-body">

      <div class="form-group">
        <label>Attack Type</label>
        <div class="attack-selector">
          <button class="attack-btn active" data-type="port_scan" onclick="selectAttack(this)">Port Scan</button>
          <button class="attack-btn" data-type="ssh_brute_force" onclick="selectAttack(this)">SSH Brute Force</button>
          <button class="attack-btn" data-type="privilege_escalation" onclick="selectAttack(this)">Priv. Escalation</button>
          <button class="attack-btn" data-type="malware_detection" onclick="selectAttack(this)">Malware</button>
          <button class="attack-btn" data-type="data_exfiltration" onclick="selectAttack(this)">Data Exfil</button>
          <button class="attack-btn" data-type="persistence_cron" onclick="selectAttack(this)">Persistence</button>
        </div>
      </div>

      <div class="form-group" id="wazuh-alerts-section" style="display:none;">
        <div class="alerts-label-row">
          <label>Recent Wazuh Alerts</label>
          <button class="btn-refresh" onclick="importFromWazuh()">↻&nbsp;&nbsp;Refresh Alerts</button>
        </div>
        <div class="wazuh-alerts" id="wazuh-alerts-list"></div>
      </div>

      <div class="form-group">
        <label>Severity</label>
        <div class="severity-selector">
          <button class="sev-btn" data-sev="low" onclick="selectSev(this)">Low</button>
          <button class="sev-btn active" data-sev="medium" onclick="selectSev(this)">Medium</button>
          <button class="sev-btn" data-sev="high" onclick="selectSev(this)">High</button>
        </div>
      </div>

      <div class="form-group">
        <label>Your Investigation Report</label>
        <textarea id="report-input" placeholder="Select an attack type above to load the template..."></textarea>
      </div>

      <div class="btn-row">
        <button class="btn-primary" onclick="analyzeReport()" id="analyze-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="currentColor" style="vertical-align:-2px;margin-right:7px;"><g transform="translate(8,8)"><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(0)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(27.7)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(55.4)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(83.1)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(110.8)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(138.5)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(166.2)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(193.8)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(221.5)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(249.2)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(276.9)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(304.6)"/><rect x="-1.2" y="-7" width="2.4" height="5.5" rx="1.2" transform="rotate(332.3)"/></g></svg>ANALYZE WITH AI
        </button>
        <button class="btn-secondary" onclick="clearReport()">Clear</button>
      </div>

      <button class="btn-github" id="github-push-btn" onclick="pushReport()" style="display:none; margin-top:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="currentColor" style="vertical-align:-2px;margin-right:7px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Push Report to GitHub
      </button>
      <div id="github-push-status" style="margin-top:6px;font-size:13px;display:none;text-align:center;"></div>

    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('feedback')">AI Feedback</div>
      <div class="tab" onclick="switchTab('history')">History</div>
    </div>

    <div class="tab-content active" id="tab-feedback">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Analyzing your report...</div>
      </div>
      <div id="feedback-empty" class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">Submit a report to get AI feedback</div>
      </div>
      <div id="feedback-result" style="display:none;">
        <div class="score-display">
          <div class="score-ring">
            <div>
              <div class="score-number" id="score-number">--</div>
              <div class="score-max">/100</div>
            </div>
          </div>
          <div id="verdict-badge"></div>
          <div class="confidence-text" id="confidence-text"></div>
        </div>
        <div id="feedback-sections"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-history">
      <div id="history-list"></div>
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
